name: CxOneFlow CI
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 3 * * 1'
    
permissions:
  contents: read

jobs:
  build-container:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Set up Docker Buildx
        id: buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Docker Image
        run: |
          docker build --progress plain -f docker/Dockerfile .

  build-kickoff-wheel:
    uses: ./.github/workflows/build-kickoff-whl.yml
    with:
      buildonly: true

  # build-kickoff-api-package:
  #   runs-on: cx-public-ubuntu-x64
  #   steps:
  #     - name: Fetch Code
  #       uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

  #     - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
  #       with:
  #         python-version: "3.12"

  #     - name: Build Package
  #       run: |
  #         pip config set global.index-url https://pypi.echohq.com/simple
  #         pip install build
  #         python3 -m build


  execute-pylint-on-api:
      runs-on: cx-public-ubuntu-x64
      strategy:
        max-parallel: 3
        matrix:
          pver:
            - "3.10"
            - "3.11"
            - "3.12"
            - "3.13"
            - "3.14"
      container: python:${{ matrix.pver }}
      steps:
        - name: Fetch Code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

        - name: Install Pylint
          shell: bash
          run: |
            pip config set global.index-url https://pypi.echohq.com/simple
            pip install . pylint

        - name: Pylint
          shell: bash
          run: |
            pylint --disable=all --enable=E,F --disable=E1121 --score=false cxoneflow_kickoff_api

  execute-linters-on-server:
      runs-on: cx-public-ubuntu-x64
      strategy:
        max-parallel: 3
        matrix:
          pver:
            - "3.12"
            - "3.13"
            - "3.14"
      container: python:${{ matrix.pver }}
      steps:
        - name: Fetch Code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

        - name: Install linters and dependencies
          shell: bash
          run: |
            pip config set global.index-url https://pypi.echohq.com/simple
            pip install pylint yamllint
            pip install -r requirements.txt

        - name: Pylint
          shell: bash
          run: pylint --disable=all --enable=E,F --disable=E1121 --score=false --ignore=cxoneflow_kickoff_api --ignore=.venv .


        - name: YAML Lint Documentation Examples
          shell: bash
          run: |
            yamllint manual

  build-agent-deb-amd64:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Debian amd64 Package
        run: agent_packages/scan-agent/debian/build-package.sh
   
  execute-unit-tests:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install packages
        run: |
          pip config set global.index-url https://pypi.echohq.com/simple
          pip install -r ${{ github.workspace }}/requirements.txt
          pip install pytest

      - name: Execute Unit Tests
        run: python -m unittest discover -v -p *_test.py -s ${{ github.workspace }}/tests

  docs-manual-build:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build PDF Manual
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          root_file: manual/cxone-flow.tex
          work_in_root_file_dir: true

  docs-release-notes-build:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build PDF Release Notes
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          root_file: release_notes/release_notes.tex
          work_in_root_file_dir: true
