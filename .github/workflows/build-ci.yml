name: CxOneFlow CI
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 3 * * 1'
    
permissions:
  contents: read

jobs:
  build-container:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Set up Docker Buildx
        id: buildx
        uses: step-security/setup-buildx-action@f931205d68723ad9589fd2a7e2ece238bf9de341 # v4.0.0

      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Docker Image
        run: |
          INDEX_URL=https://:${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}@pypi.echohq.com/simple
          docker build --progress plain -f docker/Dockerfile --secret id=PACKAGE_INDEX,env=INDEX_URL .

  build-kickoff-wheel:
    uses: ./.github/workflows/build-kickoff-whl.yml
    with:
      buildonly: true

  execute-pylint-on-api:
      runs-on: cx-public-ubuntu-x64
      strategy:
        max-parallel: 3
        matrix:
          pver:
            - "3.10"
            - "3.11"
            - "3.12"
            - "3.13"
            - "3.14"
      container: python:${{ matrix.pver }}
      steps:
        - name: Fetch Code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

        - name: Install Pylint
          shell: bash
          run: |
            pip config set global.index-url https://:${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}@pypi.echohq.com/simple
            pip install . pylint

        - name: Pylint
          shell: bash
          run: |
            pylint --disable=all --enable=E,F --disable=E1121 --score=false cxoneflow_kickoff_api

  execute-linters-on-server:
      runs-on: cx-public-ubuntu-x64
      strategy:
        max-parallel: 3
        matrix:
          pver:
            - "3.12"
            - "3.13"
            - "3.14"
      container: python:${{ matrix.pver }}
      steps:
        - name: Fetch Code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

        - name: Install linters and dependencies
          shell: bash
          run: |
            pip config set global.index-url https://:${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}@pypi.echohq.com/simple
            pip install pylint yamllint
            pip install -r requirements.txt

        - name: Pylint
          shell: bash
          run: pylint --disable=all --enable=E,F --disable=E1121 --score=false --ignore=cxoneflow_kickoff_api --ignore=.venv .


        - name: YAML Lint Documentation Examples
          shell: bash
          run: |
            yamllint manual

  build-agent-deb:
    uses: ./.github/workflows/build-agent-deb.yml
    with:
      buildonly: true

  build-yaml-examples:
    uses: ./.github/workflows/build-yaml-examples.yml
    with:
      buildonly: true

  build-latex-docs:
    uses: ./.github/workflows/build-manual.yml
    with:
      buildonly: true
   
  execute-unit-tests:
    runs-on: cx-public-ubuntu-x64
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install packages
        run: |
          pip config set global.index-url https://:${{ secrets.ECHO_LIBRARIES_ACCESS_KEY }}@pypi.echohq.com/simple
          pip install -r ${{ github.workspace }}/requirements.txt
          pip install pytest

      - name: Execute Unit Tests
        run: python -m unittest discover -v -p *_test.py -s ${{ github.workspace }}/tests

